name: Trading Education Bot

on:
  schedule:
    # Mon, Wed, Fri at UTC 01:00 = KST 10:00
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  education-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install yfinance mplfinance matplotlib requests
      - name: Run Education Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python api/education-bot.py
