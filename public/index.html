<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIM Live Market Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:      #0a0c12;
            --surface: #111420;
            --card:    #141824;
            --border:  rgba(255,255,255,0.06);
            --border2: rgba(255,255,255,0.10);
            --up:      #22d3b0;
            --dn:      #f04b5a;
            --accent:  #22d3b0;
            --text:    #e4e6f0;
            --muted:   #58607c;
            --sub:     #8b91a8;
        }
        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow-x: hidden;
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── Header ─────────────────────────────────── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px 12px;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0;
            background: var(--bg);
            z-index: 99;
        }
        .logo-wrap { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
            width: 32px; height: 32px; border-radius: 9px;
            background: linear-gradient(135deg, #22d3b0 0%, #0055ff 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
            box-shadow: 0 0 16px rgba(34,211,176,0.25);
        }
        .logo-text h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
        .logo-text p  { font-size: 10px; color: var(--muted); font-weight: 400; letter-spacing: 0.3px; margin-top: 1px; }

        /* LIVE badge */
        .live-badge {
            display: flex; align-items: center; gap: 5px;
            background: rgba(34,211,176,0.10);
            border: 1px solid rgba(34,211,176,0.20);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 10px; font-weight: 600;
            color: var(--accent); letter-spacing: 0.5px;
        }
        .live-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent);
            animation: pulse 1.8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        /* ─── Category Tabs ──────────────────────────── */
        #tabs {
            display: flex;
            overflow-x: auto;
            padding: 6px 12px 0;
            gap: 2px;
            scrollbar-width: none;
            border-bottom: 1px solid var(--border);
        }
        #tabs::-webkit-scrollbar { display: none; }
        #tabs button {
            flex-shrink: 0;
            background: none; border: none;
            padding: 9px 14px 10px;
            font-size: 13px; font-weight: 500;
            color: var(--muted);
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: color 0.18s, border-color 0.18s;
            font-family: inherit;
            letter-spacing: 0.1px;
        }
        #tabs button.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            font-weight: 600;
        }

        /* ─── Section label ─────────────────────────── */
        .section-hint {
            padding: 10px 16px 4px;
            font-size: 10px;
            color: var(--muted);
            font-weight: 500;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        /* ─── Symbols Grid ──────────────────────────── */
        #symbols {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 7px;
            padding: 8px 14px 10px;
        }
        #symbols button {
            padding: 10px 6px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--sub);
            font-size: 11.5px; font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            letter-spacing: 0.1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #symbols button:active { transform: scale(0.96); }
        #symbols button.active {
            background: rgba(34,211,176,0.12);
            color: var(--accent);
            border-color: rgba(34,211,176,0.35);
            font-weight: 700;
        }

        /* wide buttons for Forex (many symbols) */
        #symbols.wide { grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 8px 10px 10px; }
        #symbols.wide button { font-size: 10.5px; padding: 8px 4px; }

        /* ─── Price Card ─────────────────────────────── */
        #price-card {
            margin: 2px 14px 10px;
            padding: 18px 16px 14px;
            background: var(--card);
            border: 1px solid var(--border2);
            border-radius: 16px;
            display: none;
        }
        .price-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2px;
        }
        .price-sym {
            font-size: 17px; font-weight: 700;
            letter-spacing: -0.4px;
            color: var(--text);
        }
        .price-right { text-align: right; }
        .price-val {
            font-size: 26px; font-weight: 700;
            letter-spacing: -0.8px;
            line-height: 1;
            color: var(--text);
        }
        .price-chg {
            font-size: 12.5px; font-weight: 600;
            margin-top: 4px;
            display: flex; align-items: center; justify-content: flex-end; gap: 3px;
        }
        .price-chg.up { color: var(--up); }
        .price-chg.dn { color: var(--dn); }
        .divider { height: 1px; background: var(--border); margin: 12px 0 10px; }
        .hl-row {
            display: flex;
            justify-content: space-between;
        }
        .hl-item { font-size: 11px; color: var(--muted); }
        .hl-item span { color: var(--sub); font-weight: 600; margin-left: 4px; }

        /* ─── Chart Card ─────────────────────────────── */
        #chart-card {
            margin: 0 14px 22px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            display: none;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px 0;
        }
        .chart-title { font-size: 11px; font-weight: 600; color: var(--sub); letter-spacing: 0.3px; }
        .chart-badge {
            font-size: 10px; font-weight: 600;
            color: var(--muted);
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 2px 7px;
            letter-spacing: 0.3px;
        }
        #chart-container { width: 100%; height: 260px; margin-top: 6px; }
        .chart-footer {
            text-align: center;
            font-size: 9.5px;
            color: var(--muted);
            padding: 6px 0 8px;
            letter-spacing: 0.3px;
        }

        /* ─── State views ───────────────────────────── */
        #loading {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 44px 20px;
            color: var(--muted);
            font-size: 12px;
            gap: 12px;
        }
        .spinner {
            width: 24px; height: 24px;
            border: 2.5px solid rgba(255,255,255,0.08);
            border-left-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #error-msg {
            display: none;
            text-align: center;
            padding: 24px 20px;
            color: var(--dn);
            font-size: 12.5px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-wrap">
        <div class="logo-icon">📈</div>
        <div class="logo-text">
            <h1>MIM Live Terminal</h1>
            <p>MIM Global Financial Services</p>
        </div>
    </div>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
</header>

<div id="tabs"></div>
<div class="section-hint" id="section-hint">SELECT INSTRUMENT</div>
<div id="symbols"></div>

<div id="loading"><div class="spinner"></div>Loading market data...</div>
<div id="error-msg"></div>

<div id="price-card">
    <div class="price-top">
        <div class="price-sym" id="d-sym">--</div>
        <div class="price-right">
            <div class="price-val" id="d-price">--</div>
            <div class="price-chg" id="d-chg">--</div>
        </div>
    </div>
    <div class="divider"></div>
    <div class="hl-row">
        <div class="hl-item">High<span id="d-high">--</span></div>
        <div class="hl-item">Low<span id="d-low">--</span></div>
    </div>
</div>

<div id="chart-card">
    <div class="chart-header">
        <div class="chart-title" id="chart-title">--</div>
        <div class="chart-badge">30 MIN</div>
    </div>
    <div id="chart-container"></div>
    <div class="chart-footer">5D · 30min Candlestick · MIM Global Financial Services</div>
</div>

<script>
// ── Telegram WebApp ───────────────────────────────────────────────────────
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.expand(); tg.ready(); }

// ── Categories & Symbols ──────────────────────────────────────────────────
const CATS = {
    indices:     { label: 'Indices',     syms: ['EURO 50','US 30','HK 50','JP 225','UK 100','US 100','US 500'] },
    stocks:      { label: 'Stocks',      syms: ['AAPL','AMZN','GOOG','MSFT','NFLX','TSLA','AMD','NVDA','META'] },
    crypto:      { label: 'Crypto',      syms: ['BTC/USD','ETH/USD','XRP/USD','DOGE/USD','SOL/USD'] },
    forex:       { label: 'Forex',       syms: ['EUR/USD','GBP/USD','USD/JPY','AUD/USD','USD/CAD','USD/CHF','EUR/JPY','GBP/JPY','EUR/GBP','NZD/USD','USD/CNH','EUR/AUD','GBP/AUD','AUD/JPY','CHF/JPY','CAD/JPY','EUR/CHF','GBP/CAD','GBP/NZD','AUD/CAD','AUD/CHF','AUD/NZD','NZD/JPY','USD/HKD','USD/SGD','USD/THB'] },
    commodities: { label: 'Commodities', syms: ['Gold','Silver','WTI Crude','Brent Crude','Natural Gas'] },
};

let curCat = 'indices';
let curSym = 'US 100';
let chartObj = null;
let cSeries  = null;

// ── Chart init ────────────────────────────────────────────────────────────
function initChart() {
    if (chartObj) return;
    const el = document.getElementById('chart-container');
    chartObj = LightweightCharts.createChart(el, {
        width:  el.clientWidth,
        height: 260,
        layout: {
            background: { type: 'solid', color: 'transparent' },
            textColor: '#58607c',
            fontSize: 11,
        },
        grid: {
            vertLines: { color: 'rgba(255,255,255,0.03)' },
            horzLines: { color: 'rgba(255,255,255,0.04)' },
        },
        timeScale: {
            borderColor: 'rgba(255,255,255,0.06)',
            timeVisible: true,
            secondsVisible: false,
            ticksVisible: false,
        },
        rightPriceScale: {
            borderColor: 'rgba(255,255,255,0.06)',
            scaleMargins: { top: 0.12, bottom: 0.12 },
            autoScale: true,
            // Show fewer price labels for cleaner look
            mode: 0,
        },
        crosshair: {
            vertLine: { color: 'rgba(255,255,255,0.15)', labelBackgroundColor: '#1a1d26' },
            horzLine: { color: 'rgba(255,255,255,0.15)', labelBackgroundColor: '#1a1d26' },
        },
        handleScroll: true,
        handleScale:  true,
    });

    cSeries = chartObj.addCandlestickSeries({
        upColor:     '#22d3b0',
        downColor:   '#f04b5a',
        borderVisible: false,
        wickUpColor:   '#22d3b0',
        wickDownColor: '#f04b5a',
    });

    // Reduce Y-axis density
    chartObj.priceScale('right').applyOptions({
        autoScale: true,
    });

    window.addEventListener('resize', () => {
        chartObj.applyOptions({ width: el.clientWidth });
    });
}

// ── Format price ──────────────────────────────────────────────────────────
function fmt(sym, v) {
    if (v == null || isNaN(v)) return '--';
    let d = 2;
    if (v < 0.01)  d = 6;
    else if (v < 1)  d = 5;
    else if (v < 10) d = 4;
    if (sym.includes('JPY') || sym === 'Silver') d = 3;
    return Number(v).toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
}

// ── Fetch quote & chart ───────────────────────────────────────────────────
async function loadQuote(cat, sym) {
    const $loading  = document.getElementById('loading');
    const $error    = document.getElementById('error-msg');
    const $priceCard = document.getElementById('price-card');
    const $chartCard = document.getElementById('chart-card');

    $loading.style.display = 'flex';
    $error.style.display   = 'none';
    $priceCard.style.display = 'none';
    $chartCard.style.display = 'none';

    try {
        const url = `/api/quote?cat=${encodeURIComponent(cat)}&sym=${encodeURIComponent(sym)}`;
        const res = await fetch(url);
        const d   = await res.json();
        if (d.error) throw new Error(d.error);

        // Price card
        document.getElementById('d-sym').textContent   = sym;
        document.getElementById('d-price').textContent = fmt(sym, d.price);
        const pct = Number(d.change_pct || 0);
        const chgEl = document.getElementById('d-chg');
        chgEl.innerHTML = (pct >= 0 ? '▲' : '▼') + ' ' + Math.abs(pct).toFixed(2) + '%';
        chgEl.className = 'price-chg ' + (pct >= 0 ? 'up' : 'dn');
        document.getElementById('d-high').textContent = fmt(sym, d.high);
        document.getElementById('d-low').textContent  = fmt(sym, d.low);
        $priceCard.style.display = 'block';

        // Chart
        if (d.ohlc && d.ohlc.length > 1) {
            initChart();

            // Use only last 5 days of data for "recent" feel
            const recent = d.ohlc.slice(-240); // ~5 days at 30min = 240 bars
            cSeries.setData(recent);
            chartObj.timeScale().fitContent();

            // Update chart title
            document.getElementById('chart-title').textContent = sym + ' · 5D';
            $chartCard.style.display = 'block';
        }

        if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');

    } catch (err) {
        $error.textContent = '⚠️ Unable to load data for ' + sym + '. Please try again.';
        $error.style.display = 'block';
    } finally {
        $loading.style.display = 'none';
    }
}

// ── Render tabs ───────────────────────────────────────────────────────────
function renderTabs() {
    const el = document.getElementById('tabs');
    el.innerHTML = '';
    Object.keys(CATS).forEach(key => {
        const btn = document.createElement('button');
        btn.textContent = CATS[key].label;
        if (key === curCat) btn.className = 'active';
        btn.onclick = () => {
            curCat = key;
            curSym = CATS[key].syms[0];
            renderTabs();
            renderSymbols();
            loadQuote(curCat, curSym);
        };
        el.appendChild(btn);
    });
}

// ── Render symbol buttons ─────────────────────────────────────────────────
function renderSymbols() {
    const el = document.getElementById('symbols');
    el.innerHTML = '';

    // Use 4 cols for forex (many symbols), 3 cols for others
    el.className = curCat === 'forex' ? 'wide' : '';

    CATS[curCat].syms.forEach(sym => {
        const btn = document.createElement('button');
        btn.textContent = sym;
        if (sym === curSym) btn.className = 'active';
        btn.onclick = () => {
            curSym = sym;
            renderSymbols();
            loadQuote(curCat, curSym);
        };
        el.appendChild(btn);
    });
}

// ── Init ──────────────────────────────────────────────────────────────────
renderTabs();
renderSymbols();
loadQuote(curCat, curSym);
</script>
</body>
</html>
