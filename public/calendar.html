<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Economic Calendar</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #131722; }
  iframe {
    width: 100%; height: 100%;
    border: none;
    position: fixed; top: 0; left: 0;
  }
</style>
</head>
<body>
<script>
  // Build TradingView embed widget URL (same method as CalendarPage.tsx)
  const config = {
    locale: 'en',
    colorTheme: 'dark',
    isTransparent: true,
    importanceFilter: '-1,0,1',
    countryFilter: 'us,jp,eu,gb,cn,kr,ca,au',
    timezone: 'Etc/UTC',
    width: '100%',
    height: '100%'
  };
  const encoded = btoa(JSON.stringify(config));
  const src = 'https://s.tradingview.com/embed-widget/events/#' + encoded;

  const iframe = document.createElement('iframe');
  iframe.src = src;
  iframe.frameBorder = '0';
  iframe.allowTransparency = true;
  iframe.scrolling = 'no';
  iframe.allow = 'clipboard-write';
  document.body.appendChild(iframe);

  if (window.Telegram && window.Telegram.WebApp) {
    window.Telegram.WebApp.expand();
    window.Telegram.WebApp.ready();
  }
</script>
</body>
</html>
