<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyInvestmentMarkets - Live Prices</title>
    <!-- Telegram Web App JS -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #13141b);
            color: var(--tg-theme-text-color, #ffffff);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .tab-active {
            border-bottom: 2px solid #00d4aa;
            color: #00d4aa;
        }
        .sym-btn {
            background-color: var(--tg-theme-secondary-bg-color, #1e1e2d);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }
        .sym-btn-active {
            background-color: #00d4aa;
            color: #000;
            font-weight: 600;
        }
        #chart-container {
            width: 100%;
            height: 300px;
            position: relative;
        }
        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            width: 30px; height: 30px;
            border-radius: 50%;
            border-left-color: #00d4aa;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen pb-10">

    <!-- Header -->
    <header class="p-4 border-b border-gray-800 flex justify-between items-center sticky top-0 bg-[#13141b] bg-opacity-95 z-50">
        <div>
            <h1 class="text-xl font-bold tracking-tight">MIM Live Quotes</h1>
            <p class="text-xs text-gray-400">MyInvestmentMarkets</p>
        </div>
        <button id="closeBtn" class="text-gray-400 p-2" onclick="Telegram.WebApp.close()">✕</button>
    </header>

    <!-- Category Tabs -->
    <div id="tabs" class="flex overflow-x-auto whitespace-nowrap border-b border-gray-800 p-2 scrollbar-hide text-sm">
        <!-- JS renders tabs here -->
    </div>

    <!-- Symbols Grid -->
    <div class="p-4">
        <div id="symbols" class="grid grid-cols-3 gap-2 sm:grid-cols-4">
            <!-- JS renders symbol buttons here -->
        </div>
    </div>

    <!-- Price & Chart Area -->
    <div id="data-area" class="px-4 hidden mt-2">
        <!-- Price Header -->
        <div class="bg-[#1e1e2d] rounded-xl p-4 mb-4 shadow-lg border border-gray-800">
            <div class="flex justify-between items-start mb-2">
                <h2 id="disp-sym" class="text-2xl font-bold">--</h2>
                <div class="text-right">
                    <span id="disp-price" class="text-2xl font-bold tracking-tight">--</span>
                    <div id="disp-change" class="text-sm font-medium mt-1">--</div>
                </div>
            </div>
            <div class="flex justify-between text-xs text-gray-400 mt-4 pt-3 border-t border-gray-800">
                <div>High <span id="disp-high" class="text-gray-200 ml-1">--</span></div>
                <div>Low <span id="disp-low" class="text-gray-200 ml-1">--</span></div>
            </div>
        </div>

        <!-- Chart Container -->
        <div class="bg-[#1e1e2d] rounded-xl p-1 shadow-lg border border-gray-800">
            <div id="chart-loading" class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 hidden z-10">
                <div class="spinner"></div>
            </div>
            <div id="chart-container"></div>
            <div class="text-center text-[10px] text-gray-500 pb-2">30D Candlestick Chart | MyInvestmentMarkets</div>
        </div>
    </div>

    <script>
        // Init Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Exact match with Python backend keys
        const CATEGORIES = {
            "stocks": {
                label: "주식",
                symbols: ["AAPL", "AMZN", "GOOG", "MSFT", "NFLX", "TSLA", "AMD", "GOOGL", "NVDA", "META"]
            },
            "indices": {
                label: "지수",
                symbols: ["EURO 50", "US 30", "HK 50", "JP 225", "UK 100", "US 100", "US 500"]
            },
            "crypto": {
                label: "암호화폐",
                symbols: ["BTC/USD", "ETH/USD", "XRP/USD", "DOGE/USD", "SOL/USD"]
            },
            "forex": {
                label: "외환",
                symbols: ["AUD/CAD", "AUD/CHF", "AUD/JPY", "AUD/NZD", "AUD/USD", "CAD/JPY", "CHF/JPY", "EUR/AUD", "EUR/CHF", "EUR/GBP", "EUR/JPY", "EUR/USD", "GBP/AUD", "GBP/JPY", "GBP/USD", "GBP/CAD", "GBP/NZD", "NZD/JPY", "NZD/USD", "USD/CAD", "USD/CHF", "USD/HKD", "USD/JPY", "USD/SGD", "USD/CNH", "USD/THB"]
            },
            "commodities": {
                label: "원자재",
                symbols: ["Silver", "Gold", "WTI Crude", "Brent Crude", "Natural Gas"]
            }
        };

        let currentCat = "indices";
        let currentSym = "US 100";
        let chart = null;
        let cseries = null;

        // Init Chart
        function initChart() {
            if (chart) return;
            const container = document.getElementById('chart-container');
            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: 300,
                layout: {
                    background: { type: 'solid', color: 'transparent' },
                    textColor: '#aaa',
                },
                grid: {
                    vertLines: { color: 'rgba(255, 255, 255, 0.03)' },
                    horzLines: { color: 'rgba(255, 255, 255, 0.03)' },
                },
                timeScale: {
                    borderColor: 'rgba(255, 255, 255, 0.1)',
                    timeVisible: false,
                },
                rightPriceScale: {
                    borderColor: 'rgba(255, 255, 255, 0.1)',
                },
            });

            cseries = chart.addCandlestickSeries({
                upColor: '#00d4aa',
                downColor: '#ff4757',
                borderVisible: false,
                wickUpColor: '#00d4aa',
                wickDownColor: '#ff4757',
            });
            
            window.addEventListener('resize', () => {
                if(container.clientWidth > 0) {
                    chart.applyOptions({ width: container.clientWidth });
                }
            });
        }

        function formatPrice(sym, p) {
            if (!p) return "--";
            let dec = 2;
            if (p > 1000) dec = 2;
            else if (p > 1) dec = 4;
            else dec = 6;
            
            if (sym.includes("JPY") || sym.includes("Crude") || sym === "Silver") dec = 3;
            if (["EURO 50", "US 30", "HK 50", "JP 225", "UK 100", "US 100", "US 500"].includes(sym)) dec = 2;
            
            return Number(p).toLocaleString('en-US', {minimumFractionDigits: dec, maximumFractionDigits: dec});
        }

        async function fetchQuote(cat, sym) {
            document.getElementById('data-area').classList.remove('hidden');
            document.getElementById('chart-loading').classList.remove('hidden');
            document.getElementById('disp-sym').innerText = sym;
            
            try {
                // Encode sym parameter to handle spaces and slashes correctly e.g %20, %2F
                const res = await fetch(`/api/quote?cat=${cat}&sym=${encodeURIComponent(sym)}`);
                const data = await res.json();
                
                if (data.error) throw new Error(data.error);

                // Update UI Prices
                document.getElementById('disp-price').innerText = formatPrice(sym, data.price);
                
                const pct = Number(data.change_pct);
                const elChange = document.getElementById('disp-change');
                if (pct >= 0) {
                    elChange.innerText = `+${pct.toFixed(2)}% ▲`;
                    elChange.className = "text-sm font-medium mt-1 text-[#00d4aa]";
                } else {
                    elChange.innerText = `${pct.toFixed(2)}% ▼`;
                    elChange.className = "text-sm font-medium mt-1 text-[#ff4757]";
                }
                
                document.getElementById('disp-high').innerText = formatPrice(sym, data.high);
                document.getElementById('disp-low').innerText = formatPrice(sym, data.low);

                // Update Chart
                if (!chart) initChart();
                if (data.ohlc && data.ohlc.length > 0) {
                    // Safe set data
                    cseries.setData(data.ohlc);
                    chart.timeScale().fitContent();
                } else {
                    cseries.setData([]);
                }
            } catch (err) {
                console.error(err);
                document.getElementById('disp-price').innerText = "Error";
                document.getElementById('disp-change').innerText = "--";
                document.getElementById('disp-high').innerText = "--";
                document.getElementById('disp-low').innerText = "--";
                if(cseries) cseries.setData([]); // clear chart on error
            } finally {
                document.getElementById('chart-loading').classList.add('hidden');
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            }
        }

        function renderSymbols(catKey) {
            const syms = CATEGORIES[catKey].symbols;
            const cont = document.getElementById('symbols');
            cont.innerHTML = '';
            
            syms.forEach(sym => {
                const btn = document.createElement('button');
                btn.className = `sym-btn py-2 px-1 text-xs rounded-lg truncate ${sym === currentSym ? 'sym-btn-active' : 'text-gray-300'}`;
                btn.innerText = sym;
                btn.onclick = () => {
                    currentSym = sym;
                    renderSymbols(catKey);
                    fetchQuote(catKey, sym);
                };
                cont.appendChild(btn);
            });
        }

        function renderTabs() {
            const cont = document.getElementById('tabs');
            cont.innerHTML = '';
            
            Object.keys(CATEGORIES).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `px-5 py-3 font-medium ${key === currentCat ? 'tab-active' : 'text-gray-400'}`;
                btn.innerText = CATEGORIES[key].label;
                btn.onclick = () => {
                    currentCat = key;
                    renderTabs();
                    renderSymbols(key);
                    
                    const firstSym = CATEGORIES[key].symbols[0];
                    currentSym = firstSym;
                    renderSymbols(key);
                    fetchQuote(key, firstSym);
                };
                cont.appendChild(btn);
            });
        }

        // Init
        renderTabs();
        renderSymbols(currentCat);
        setTimeout(() => fetchQuote(currentCat, currentSym), 200);

    </script>
</body>
</html>
